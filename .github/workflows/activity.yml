name: 📊 Update README Activity

on:
  schedule:
    - cron: '0 */6 * * *'  # Roda a cada 6 horas
  workflow_dispatch:        # Permite rodar manualmente
  push:
    branches:
      - main

jobs:
  update-readme:
    name: Update README with Recent Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔄 Update README with GitHub Activity
        uses: Readme-Workflows/recent-activity@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: devimploy
          MAX_LINES: 5
          COMMIT_MSG: '⚡ [BOT] Auto-update: atividade recente do GitHub'
